<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>leyzor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- vanilla-tilt -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>

    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

        body,html{
            height:100%;
            font-family:'Syne',sans-serif;
            background:#000;color:#fff;
            overflow:hidden;
            cursor:none;
        }

        /* ─── SMOOTH CURSOR ─── */
        #cursor{
            position:fixed;
            width:20px;height:20px;
            border:1.5px solid rgba(255,255,255,0.7);
            border-radius:50%;
            pointer-events:none;
            z-index:99999;
            transform:translate(-50%,-50%);
            transition:width 0.2s ease, height 0.2s ease, border-color 0.2s ease, background 0.2s ease;
            mix-blend-mode:difference;
        }
        #cursor.hover{
            width:36px;height:36px;
            border-color:rgba(255,255,255,1);
            background:rgba(255,255,255,0.08);
        }
        #cursor-dot2{
            position:fixed;
            width:4px;height:4px;
            background:#fff;
            border-radius:50%;
            pointer-events:none;
            z-index:99999;
            transform:translate(-50%,-50%);
            mix-blend-mode:difference;
        }

        /* ─── CANVAS TRAIL ─── */
        #trail-canvas{
            position:fixed;inset:0;z-index:9997;pointer-events:none;
        }

        /* ─── BG VIDEO ─── */
        .bg-video{
            position:fixed;top:50%;left:50%;
            min-width:100%;min-height:100%;width:auto;height:auto;
            transform:translate(-50%,-50%);z-index:0;
            filter:brightness(0.25) saturate(0.6);object-fit:cover;
            opacity:0;transition:opacity 2s ease;
        }
        .bg-video.show{opacity:1}

        /* ─── VOLUME ─── */
        #vol-wrap{
            position:fixed;top:18px;right:18px;z-index:200;
            display:none;flex-direction:column;align-items:center;gap:6px;
        }
        #vol-wrap.show{display:flex}
        #vol-icon{
            width:38px;height:38px;border-radius:50%;
            background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);
            display:flex;align-items:center;justify-content:center;
            cursor:pointer;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
            transition:background 0.2s,transform 0.2s;color:rgba(255,255,255,0.7);
        }
        #vol-icon:hover{background:rgba(255,255,255,0.13);transform:scale(1.1);color:#fff}
        #vol-icon svg{width:16px;height:16px}
        #vol-panel{
            display:flex;flex-direction:column;align-items:center;
            background:rgba(10,10,10,0.85);border:1px solid rgba(255,255,255,0.08);
            border-radius:20px;padding:10px 12px;gap:6px;
            backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
            opacity:0;transform:translateY(-8px) scale(0.92);
            transition:opacity 0.22s ease,transform 0.22s ease;pointer-events:none;
        }
        #vol-panel.open{opacity:1;transform:translateY(0) scale(1);pointer-events:all}
        #vol-slider{
            -webkit-appearance:none;appearance:none;
            writing-mode:vertical-lr;direction:rtl;
            width:4px;height:80px;background:rgba(255,255,255,0.12);
            border-radius:4px;outline:none;cursor:pointer;
        }
        #vol-slider::-webkit-slider-thumb{
            -webkit-appearance:none;width:14px;height:14px;border-radius:50%;
            background:#fff;cursor:pointer;box-shadow:0 0 8px rgba(255,255,255,0.35);
        }
        #vol-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#fff;cursor:pointer;border:none;}
        #vol-pct{font-family:'DM Mono',monospace;font-size:9px;color:rgba(255,255,255,0.3);letter-spacing:0.05em;}

        /* ─── VISITOR COUNTER ─── */
        #visitor-wrap{
            position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
            z-index:200;display:none;align-items:center;gap:14px;
            font-family:'DM Mono',monospace;font-size:10px;
            color:rgba(255,255,255,0.18);letter-spacing:0.12em;text-transform:uppercase;white-space:nowrap;
        }
        #visitor-wrap.show{display:flex}
        #visitor-count{color:rgba(255,255,255,0.28);font-weight:500}
        .footer-sep{color:rgba(255,255,255,0.1);font-size:8px}
        .footer-location{
            color:rgba(255,255,255,0.22);font-family:'Syne',sans-serif;
            font-size:10px;font-weight:400;letter-spacing:0.06em;text-transform:none;
        }

        /* ─── ENTER SCREEN — SPLIT CURTAIN ─── */
        #enter-screen{position:fixed;inset:0;z-index:100;cursor:none;}
        .curtain-half{
            position:absolute;left:0;right:0;background:#000;
            display:flex;align-items:center;justify-content:center;
            transition:transform 0.9s cubic-bezier(0.76,0,0.24,1);overflow:hidden;
        }
        .curtain-top{top:0;height:50%;align-items:flex-end;}
        .curtain-bottom{bottom:0;height:50%;align-items:flex-start;}
        #enter-text-wrap{
            position:absolute;top:50%;left:50%;
            transform:translate(-50%,-50%);z-index:101;text-align:center;pointer-events:none;
        }

        /* ─── GLITCH TEXT ─── */
        #typewriter{
            font-family:'Syne',sans-serif;
            font-size:clamp(10px,1.4vw,14px);font-weight:400;
            color:rgba(255,255,255,0.28);
            letter-spacing:0.45em;text-transform:uppercase;white-space:nowrap;
            position:relative;
            display:inline-block;
        }
        /* Glitch layers */
        #typewriter::before,
        #typewriter::after{
            content:attr(data-text);
            position:absolute;top:0;left:0;width:100%;
            color:rgba(255,255,255,0.28);letter-spacing:0.45em;
            overflow:hidden;
            pointer-events:none;
        }
        #typewriter::before{
            left:2px;
            text-shadow:-1px 0 rgba(255,100,100,0.5);
            animation:glitch1 4s infinite linear;
            clip-path:polygon(0 0,100% 0,100% 35%,0 35%);
        }
        #typewriter::after{
            left:-2px;
            text-shadow:1px 0 rgba(100,200,255,0.4);
            animation:glitch2 4s infinite linear;
            clip-path:polygon(0 65%,100% 65%,100% 100%,0 100%);
        }
        @keyframes glitch1{
            0%,90%{transform:translate(0)}
            92%{transform:translate(-2px,1px)}
            94%{transform:translate(2px,-1px)}
            96%{transform:translate(-1px,0)}
            98%{transform:translate(1px,1px)}
            100%{transform:translate(0)}
        }
        @keyframes glitch2{
            0%,88%{transform:translate(0)}
            90%{transform:translate(2px,-1px)}
            93%{transform:translate(-2px,1px)}
            96%{transform:translate(1px,0)}
            99%{transform:translate(0)}
        }

        #cursor-blink{
            display:inline-block;width:1px;height:0.8em;
            background:rgba(255,255,255,0.2);margin-left:8px;
            vertical-align:middle;animation:blink 1.4s step-end infinite;
        }
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

        /* Split open state */
        #enter-screen.splitting .curtain-top{transform:translateY(-100%);}
        #enter-screen.splitting .curtain-bottom{transform:translateY(100%);}
        #enter-screen.splitting #enter-text-wrap{opacity:0;transition:opacity 0.3s ease;}

        /* ─── MAIN ─── */
        #main-content{
            position:relative;z-index:10;height:100%;
            display:flex;align-items:center;justify-content:center;
            opacity:0;pointer-events:none;transition:opacity 0.9s ease;
        }
        #main-content.visible{opacity:1;pointer-events:all}

        /* ─── CARD (tilt wrapper needs overflow visible) ─── */
        .card-tilt-wrap{
            width:min(370px,92vw);
            /* vanilla-tilt needs perspective */
            transform-style:preserve-3d;
        }
        .card{
            width:100%;
            background:rgba(8,8,8,0.55);
            backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
            border-radius:22px;overflow:hidden;
            border:1px solid rgba(255,255,255,0.07);
            box-shadow:0 28px 80px rgba(0,0,0,0.8);
            transform:translateY(50px) scale(0.95);
            transition:transform 1.1s cubic-bezier(0.16,1,0.3,1),opacity 1.1s ease;
            opacity:0;
        }
        #main-content.visible .card{transform:translateY(0) scale(1);opacity:1}

        /* Glare element injected by vanilla-tilt */
        .js-tilt-glare{border-radius:22px!important;}

        .banner{width:100%;height:95px;background:rgba(255,255,255,0.06);}

        /* ─── AVATAR ─── */
        .avatar-zone{
            padding:0 18px;margin-top:-42px;margin-bottom:10px;
            display:flex;align-items:flex-end;justify-content:space-between;
        }
        .avatar-decoration{position:relative;width:84px;height:84px;flex-shrink:0;overflow:visible;}
        .avatar-decoration::before{
            content:'';position:absolute;
            top:-14px;left:-14px;width:112px;height:112px;
            background-image:url('decoration.png');
            background-repeat:no-repeat;background-size:112px 112px;
            z-index:4;pointer-events:none;
        }
        .avatar-bg{
            position:absolute;top:0;left:0;
            width:84px;height:84px;
            border-radius:50%;background:rgba(8,8,8,0.35);z-index:2;overflow:hidden;
        }
        .avatar-bg img{width:84px;height:84px;border-radius:50%;object-fit:cover;display:block;cursor:pointer;}
        .status-dot-av{position:absolute;bottom:3px;right:3px;width:14px;height:14px;border-radius:50%;border:3px solid rgba(8,8,8,0.92);background:#747f8d;z-index:5}
        .status-dot-av.online{background:#3ba55d}.status-dot-av.idle{background:#faa61a}.status-dot-av.dnd{background:#ed4245}.status-dot-av.offline{background:#747f8d}

        .status-badge{
            display:flex;align-items:center;gap:5px;
            padding:4px 11px;background:rgba(255,255,255,0.04);
            border:1px solid rgba(255,255,255,0.07);border-radius:20px;
            margin-bottom:5px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.03em;
        }
        .status-dot-b{width:7px;height:7px;border-radius:50%;background:#747f8d;flex-shrink:0}
        .status-dot-b.online{background:#3ba55d}.status-dot-b.idle{background:#faa61a}.status-dot-b.dnd{background:#ed4245}.status-dot-b.offline{background:#747f8d}

        .card-body{padding:0 18px 16px}
        .username{font-size:22px;font-weight:800;letter-spacing:-0.03em;line-height:1}
        .handle{font-family:'DM Mono',monospace;font-size:11px;color:rgba(255,255,255,0.27);margin-top:3px;letter-spacing:0.04em}
        .member-since{
            display:inline-flex;align-items:center;gap:5px;margin-top:9px;
            font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,0.23);
            background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);
            border-radius:6px;padding:3px 8px;
        }
        .member-since svg{width:10px;height:10px;opacity:0.4;flex-shrink:0}

        .activity{
            margin-top:11px;padding:8px 12px;
            background:rgba(255,255,255,0.03);border-radius:10px;
            border:1px solid rgba(255,255,255,0.05);
            font-family:'DM Mono',monospace;font-size:11px;
            color:rgba(255,255,255,0.38);font-style:italic;
            display:flex;align-items:center;gap:8px;
        }
        .activity.hidden{display:none}

        .spotify-row{
            margin-top:8px;padding:10px 12px;
            background:rgba(30,215,96,0.05);border:1px solid rgba(30,215,96,0.12);
            border-radius:12px;display:flex;align-items:center;gap:11px;
        }
        .spotify-row.hidden{display:none}
        .spotify-art{width:44px;height:44px;border-radius:8px;flex-shrink:0;background:rgba(255,255,255,0.05);overflow:hidden;display:flex;align-items:center;justify-content:center}
        .spotify-art img{width:100%;height:100%;object-fit:cover;display:block;border-radius:8px}
        .spotify-text{overflow:hidden;flex:1}
        .spotify-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(30,215,96,0.75);margin-bottom:3px;font-weight:500}
        .spotify-song{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;letter-spacing:-0.01em}
        .spotify-artist{font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,0.32);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
        .spotify-bars{display:flex;align-items:flex-end;gap:2px;height:16px;flex-shrink:0}
        .spotify-bars span{width:3px;border-radius:2px;background:#1ed760;opacity:0.75;animation:barBounce 1s ease-in-out infinite}
        .spotify-bars span:nth-child(1){height:7px;animation-delay:0s}
        .spotify-bars span:nth-child(2){height:13px;animation-delay:0.2s}
        .spotify-bars span:nth-child(3){height:5px;animation-delay:0.35s}
        .spotify-bars span:nth-child(4){height:11px;animation-delay:0.15s}
        @keyframes barBounce{0%,100%{transform:scaleY(0.35)}50%{transform:scaleY(1)}}

        .divider{height:1px;background:rgba(255,255,255,0.05);margin:13px 0}

        /* ─── SOCIALS + AUDIO VISUALIZER ─── */
        .socials-wrap{display:flex;flex-direction:column;align-items:center;gap:10px}
        .socials{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;}
        .social-btn{
            width:40px;height:40px;border-radius:50%;
            background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);
            display:flex;align-items:center;justify-content:center;
            text-decoration:none;color:rgba(255,255,255,0.48);
            transition:background 0.2s,color 0.2s,border-color 0.2s,transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
        }
        .social-btn:hover{background:rgba(255,255,255,0.09);border-color:rgba(255,255,255,0.16);color:#fff;transform:translateY(-3px) scale(1.1)}
        .social-btn svg{width:18px;height:18px}

        /* Audio visualizer */
        #audio-viz{
            display:flex;align-items:flex-end;justify-content:center;gap:3px;height:14px;
            opacity:0;transition:opacity 0.4s ease;
        }
        #audio-viz.active{opacity:1}
        #audio-viz .bar{
            width:3px;border-radius:2px;background:rgba(255,255,255,0.25);
            animation:vizBounce 0.8s ease-in-out infinite;
        }
        #audio-viz .bar:nth-child(1){height:4px;animation-delay:0s;animation-duration:0.7s}
        #audio-viz .bar:nth-child(2){height:8px;animation-delay:0.1s;animation-duration:0.9s}
        #audio-viz .bar:nth-child(3){height:6px;animation-delay:0.2s;animation-duration:0.6s}
        #audio-viz .bar:nth-child(4){height:10px;animation-delay:0.05s;animation-duration:0.8s}
        #audio-viz .bar:nth-child(5){height:5px;animation-delay:0.15s;animation-duration:1s}
        #audio-viz .bar:nth-child(6){height:9px;animation-delay:0.25s;animation-duration:0.75s}
        #audio-viz .bar:nth-child(7){height:4px;animation-delay:0.1s;animation-duration:0.85s}
        @keyframes vizBounce{0%,100%{transform:scaleY(0.3)}50%{transform:scaleY(1)}}

        /* ─── SHAKE ANIMATION ─── */
        @keyframes shake{
            0%,100%{transform:translate(0)}
            10%{transform:translate(-8px,4px)}
            20%{transform:translate(8px,-4px)}
            30%{transform:translate(-6px,6px)}
            40%{transform:translate(6px,-6px)}
            50%{transform:translate(-8px,2px)}
            60%{transform:translate(8px,-2px)}
            70%{transform:translate(-4px,4px)}
            80%{transform:translate(4px,-4px)}
            90%{transform:translate(-2px,2px)}
        }
        body.shaking{animation:shake 0.6s ease both}

        /* ─── EASTER EGG SCREAMER ─── */
        #easter-egg{
            position:fixed;inset:0;z-index:99000;
            display:none;
            align-items:center;justify-content:center;
            background:rgba(0,0,0,0.92);
        }
        #easter-egg.show{display:flex}
        #easter-egg-text{
            font-family:'Syne',sans-serif;
            font-size:clamp(60px,12vw,130px);
            font-weight:800;
            letter-spacing:-0.04em;
            color:#fff;
            animation:easterPop 0.4s cubic-bezier(0.34,1.56,0.64,1) both, easterFade 2s ease 0.5s forwards;
        }
        @keyframes easterPop{from{transform:scale(0.2);opacity:0}to{transform:scale(1);opacity:1}}
        @keyframes easterFade{0%{opacity:1}100%{opacity:0}}
    </style>
</head>
<body>

    <canvas id="trail-canvas"></canvas>
    <div id="cursor"></div>
    <div id="cursor-dot2"></div>

    <video id="bg-video" class="bg-video" loop playsinline muted>
        <source src="video.mp4" type="video/mp4">
    </video>
    <audio id="bg-music" loop>
        <source src="musique.mp3" type="audio/mpeg">
    </audio>

    <!-- Easter egg overlay -->
    <div id="easter-egg"><div id="easter-egg-text">leyzor</div></div>

    <!-- Volume -->
    <div id="vol-wrap">
        <div id="vol-icon" onclick="toggleVolPanel()">
            <svg id="vol-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            </svg>
        </div>
        <div id="vol-panel">
            <input type="range" id="vol-slider" min="0" max="100" value="45" oninput="setVol(this.value)">
            <div id="vol-pct">45%</div>
        </div>
    </div>

    <!-- Footer -->
    <div id="visitor-wrap">
        <span>👁 <span id="visitor-count">—</span></span>
        <span class="footer-sep">·</span>
        <span class="footer-location">‧₊˚♡ [ ₁₈ ] ♡˚₊‧</span>
    </div>

    <!-- Enter — split curtain -->
    <div id="enter-screen" onclick="triggerSplit()">
        <div class="curtain-half curtain-top"></div>
        <div class="curtain-half curtain-bottom"></div>
        <div id="enter-text-wrap">
            <span id="typewriter" data-text=""></span><span id="cursor-blink"></span>
        </div>
    </div>

    <!-- Main -->
    <div id="main-content">
        <div class="card-tilt-wrap" id="card-tilt">
            <div class="card">
                <div class="banner"></div>
                <div class="avatar-zone">
                    <div class="avatar-decoration">
                        <div class="avatar-bg"><img id="avatar-img" src="" alt="avatar"></div>
                        <span class="status-dot-av offline" id="status-dot-av"></span>
                    </div>
                    <div class="status-badge">
                        <span class="status-dot-b offline" id="status-dot-b"></span>
                        <span id="status-text">Offline</span>
                    </div>
                </div>
                <div class="card-body">
                    <div class="username">leyzor</div>
                    <div class="handle">@creditagricall</div>
                    <div class="member-since">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm0 18a8 8 0 1 1 0-16 8 8 0 0 1 0 16zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg>
                        Member since April 20, 2016
                    </div>
                    <div class="activity hidden" id="activity-row">
                        <span id="activity-icon">▶</span><span id="activity-text"></span>
                    </div>
                    <div class="spotify-row hidden" id="spotify-row">
                        <div class="spotify-art" id="spotify-art"></div>
                        <div class="spotify-text">
                            <div class="spotify-label">En écoute</div>
                            <div class="spotify-song" id="spotify-song">—</div>
                            <div class="spotify-artist" id="spotify-artist">—</div>
                        </div>
                        <div class="spotify-bars"><span></span><span></span><span></span><span></span></div>
                    </div>
                    <div class="divider"></div>
                    <div class="socials-wrap">
                        <!-- Audio visualizer above socials -->
                        <div id="audio-viz">
                            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                            <div class="bar"></div>
                        </div>
                        <div class="socials">
                            <a class="social-btn" href="https://open.spotify.com" target="_blank" title="Spotify">
                                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
                            </a>

    <script>
        const DISCORD_ID = '172383880677031938';
        const TEXT = 'click to dive into my world';

        // ─── SMOOTH CURSOR ──────────────────────────────────────────
        const cursor     = document.getElementById('cursor');
        const cursorDot  = document.getElementById('cursor-dot2');
        let cx = 0, cy = 0; // smooth cursor position
        let tx = 0, ty = 0; // target (mouse) position

        document.addEventListener('mousemove', e => {
            tx = e.clientX; ty = e.clientY;
            cursorDot.style.left = tx + 'px';
            cursorDot.style.top  = ty + 'px';
        });

        // Lerp cursor
        function animCursor() {
            cx += (tx - cx) * 0.12;
            cy += (ty - cy) * 0.12;
            cursor.style.left = cx + 'px';
            cursor.style.top  = cy + 'px';
            requestAnimationFrame(animCursor);
        }
        animCursor();

        // Hover state on interactive elements
        document.querySelectorAll('a,button,[onclick],input,#avatar-img,.social-btn').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
        });

        // ─── CANVAS TRAIL ───────────────────────────────────────────
        const canvas = document.getElementById('trail-canvas');
        const ctx    = canvas.getContext('2d');
        function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
        resizeCanvas();
        window.addEventListener('resize',resizeCanvas);

        const MAX_POINTS=80, trail=[];
        let mouseX=-1000,mouseY=-1000;
        document.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;});

        const TRAIL_LIFETIME=900;
        function addPoint(x,y){trail.push({x,y,t:Date.now()});if(trail.length>MAX_POINTS)trail.shift();}
        let lastAdd=0;
        function renderTrail(){
            const now=Date.now();
            if(now-lastAdd>12){lastAdd=now;if(mouseX>-999)addPoint(mouseX,mouseY);}
            const cutoff=now-TRAIL_LIFETIME;
            while(trail.length>0&&trail[0].t<cutoff)trail.shift();
            ctx.clearRect(0,0,canvas.width,canvas.height);
            if(trail.length<3){requestAnimationFrame(renderTrail);return;}
            ctx.lineCap='round';ctx.lineJoin='round';
            for(let i=1;i<trail.length-1;i++){
                const age=(now-trail[i].t)/TRAIL_LIFETIME;
                const alpha=Math.pow(1-age,1.8)*0.75;
                if(alpha<=0.01)continue;
                const p0=trail[i-1],p1=trail[i],p2=trail[i+1];
                const cpx=(p0.x+p1.x)/2,cpy=(p0.y+p1.y)/2;
                const cpx2=(p1.x+p2.x)/2,cpy2=(p1.y+p2.y)/2;
                ctx.beginPath();
                ctx.strokeStyle=`rgba(255,255,255,${alpha})`;
                ctx.lineWidth=(1-age)*1.5+0.3;
                ctx.moveTo(cpx,cpy);
                ctx.quadraticCurveTo(p1.x,p1.y,cpx2,cpy2);
                ctx.stroke();
            }
            requestAnimationFrame(renderTrail);
        }
        renderTrail();

        // ─── VOLUME ─────────────────────────────────────────────────
        const bgMusic  = document.getElementById('bg-music');
        const bgVideo  = document.getElementById('bg-video');
        const volWrap  = document.getElementById('vol-wrap');
        const visitorW = document.getElementById('visitor-wrap');
        let volOpen    = false;

        function toggleVolPanel(){volOpen=!volOpen;document.getElementById('vol-panel').classList.toggle('open',volOpen);}
        function setVol(val){
            const v=parseInt(val)/100;
            bgMusic.volume=v;bgMusic.muted=false;
            document.getElementById('vol-pct').textContent=val+'%';
            const svg=document.getElementById('vol-svg');
            if(v===0){svg.innerHTML=`<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>`;}
            else if(v<0.5){svg.innerHTML=`<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>`;}
            else{svg.innerHTML=`<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>`;}
        }
        document.addEventListener('click',e=>{
            if(volOpen&&!volWrap.contains(e.target)){volOpen=false;document.getElementById('vol-panel').classList.remove('open');}
        });

        // ─── VISITOR COUNTER ────────────────────────────────────────
        (function(){
            fetch('https://visitor.6developer.com/visit',{
                method:'POST',headers:{'Content-Type':'application/json'},
                body:JSON.stringify({
                    domain:encodeURIComponent(window.location.hostname),
                    timezone:Intl.DateTimeFormat().resolvedOptions().timeZone,
                    page_path:window.location.pathname,page_title:document.title,
                    referrer:document.referrer,search_query:''
                })
            }).then(r=>r.json()).then(data=>{
                const el=document.getElementById('visitor-count');
                if(el&&data.totalCount!=null)el.textContent=Number(data.totalCount+200).toLocaleString();
            }).catch(()=>{});
        })();

        // ─── TYPEWRITER + GLITCH ────────────────────────────────────
        const typeEl=document.getElementById('typewriter');
        let i=0;
        function type(){
            if(i<TEXT.length){
                typeEl.textContent+=TEXT[i];
                typeEl.setAttribute('data-text',typeEl.textContent); // keep glitch layers in sync
                i++;
                setTimeout(type,65+Math.random()*45);
            }
        }
        setTimeout(type,700);

        // ─── SPLIT CURTAIN ──────────────────────────────────────────
        let splitDone=false;
        function triggerSplit(){
            if(splitDone)return;splitDone=true;
            const enter=document.getElementById('enter-screen');
            enter.classList.add('splitting');
            bgVideo.play().catch(()=>{});
            setTimeout(()=>bgVideo.classList.add('show'),200);
            bgMusic.load();bgMusic.volume=0.45;
            setTimeout(()=>bgMusic.play().catch(()=>{}),80);
            setTimeout(()=>{
                document.getElementById('main-content').classList.add('visible');
                volWrap.classList.add('show');
                visitorW.classList.add('show');
                document.getElementById('audio-viz').classList.add('active');
                // Init vanilla-tilt AFTER card is visible
                VanillaTilt.init(document.getElementById('card-tilt'),{
                    max:8,speed:400,glare:true,'max-glare':0.12,perspective:1000
                });
                // Hook hover cursor on new tilt element
                document.getElementById('card-tilt').addEventListener('mouseenter',()=>cursor.classList.add('hover'));
                document.getElementById('card-tilt').addEventListener('mouseleave',()=>cursor.classList.remove('hover'));
            },400);
            setTimeout(()=>{enter.style.display='none';},1100);
        }

        // ─── EASTER EGG ─────────────────────────────────────────────
        let eggClicks=0,eggTimer=null;
        document.getElementById('avatar-img').addEventListener('click',e=>{
            e.stopPropagation();
            eggClicks++;
            clearTimeout(eggTimer);
            eggTimer=setTimeout(()=>{eggClicks=0;},1200);
            if(eggClicks>=5){
                eggClicks=0;
                // Shake body
                document.body.classList.add('shaking');
                setTimeout(()=>document.body.classList.remove('shaking'),600);
                // Show screamer
                const ee=document.getElementById('easter-egg');
                ee.classList.add('show');
                setTimeout(()=>ee.classList.remove('show'),2600);
            }
        });

        // ─── LANYARD ────────────────────────────────────────────────
        async function fetchDiscord(){
            try{
                const res=await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
                const json=await res.json();
                if(!json.success)return;
                const d=json.data,u=d.discord_user;
                const hash=u.avatar,ext=hash?.startsWith('a_')?'gif':'png';
                document.getElementById('avatar-img').src=hash
                    ?`https://cdn.discordapp.com/avatars/${u.id}/${hash}.${ext}?size=128`
                    :`https://cdn.discordapp.com/embed/avatars/${(parseInt(u.id)>>22)%6}.png`;
                const status=d.discord_status||'offline';
                document.getElementById('status-dot-av').className=`status-dot-av ${status}`;
                document.getElementById('status-dot-b').className=`status-dot-b ${status}`;
                const labels={online:'Online',idle:'Idle',dnd:'Do not disturb',offline:'Offline'};
                document.getElementById('status-text').textContent=labels[status];
                const acts=d.activities||[];
                const custom=acts.find(a=>a.type===4);
                const other=acts.find(a=>a.type!==4&&a.type!==2);
                const actRow=document.getElementById('activity-row');
                if(custom?.state){document.getElementById('activity-icon').textContent='💬';document.getElementById('activity-text').textContent=custom.state;actRow.classList.remove('hidden');}
                else if(other){const icons={0:'🎮',1:'📡',3:'📺'};document.getElementById('activity-icon').textContent=icons[other.type]||'▶';document.getElementById('activity-text').textContent=other.name;actRow.classList.remove('hidden');}
                else{actRow.classList.add('hidden');}
                const spRow=document.getElementById('spotify-row');
                if(d.spotify?.song){
                    document.getElementById('spotify-song').textContent=d.spotify.song;
                    document.getElementById('spotify-artist').textContent=d.spotify.artist;
                    document.getElementById('spotify-art').innerHTML=d.spotify.album_art_url?`<img src="${d.spotify.album_art_url}" alt="cover">`:'';
                    spRow.classList.remove('hidden');
                }else{spRow.classList.add('hidden');}
            }catch(e){}
        }
        fetchDiscord();
        setInterval(fetchDiscord,20000);
    </script>
